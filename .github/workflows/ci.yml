name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: brew install gitleaks

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks git \
            --config ./.gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-report.sarif

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif

      - name: Fail job when Gitleaks finds leaks
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks detected secrets."
          exit 1

  lint-and-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift tooling
        run: brew install swiftlint swiftformat

      - name: SwiftFormat
        run: swiftformat ./Yuri --config ./.swiftformat --lint

      - name: SwiftLint
        run: swiftlint lint --strict --no-cache --config ./.swiftlint.yml

      - name: Xcode build
        run: |
          xcodebuild \
            -project ./Yuri.xcodeproj \
            -scheme Yuri \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

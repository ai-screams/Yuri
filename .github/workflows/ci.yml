name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

# PR에 연속 푸시 시 오래된 실행을 취소(러너 시간 절약). main 푸시는 취소하지 않는다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  secret-scan:
    runs-on: macos-15 # release.yml과 러너 통일(재현성)

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: brew install gitleaks

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks git \
            --config ./.gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-report.sarif

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: gitleaks-report.sarif

      - name: Fail job when Gitleaks finds leaks
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks detected secrets."
          exit 1

  lint-and-build:
    runs-on: macos-15 # release.yml과 러너 통일(재현성)

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Install Swift tooling
        run: brew install swiftlint swiftformat

      - name: SwiftFormat
        run: swiftformat ./Azimuth --config ./.swiftformat --lint

      - name: SwiftLint
        run: swiftlint lint --strict --no-cache --config ./.swiftlint.yml

      - name: Xcode build
        run: |
          xcodebuild \
            -project ./Azimuth.xcodeproj \
            -scheme Azimuth \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Command-engine tests
        run: ./scripts/test.sh

      - name: Coverage gate (pure logic >= 90%)
        run: make coverage
